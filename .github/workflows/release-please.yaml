name: release-please

on:
  push:
    branches:
      - main

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate a token
        id: generate-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.CI_GITHUB_APP_APP_ID }}
          private-key: ${{ secrets.CI_GITHUB_APP_SECRET }}
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ steps.generate-token.outputs.token }}
          release-type: dart

      - name: Wait for release PR branch
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: sleep 10

      - uses: actions/checkout@v6
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        with:
          ref: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
          token: ${{ steps.generate-token.outputs.token }}

      - uses: dart-lang/setup-dart@v1
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        with:
          sdk: "3.11.5"

      - name: 📦 Install Dependencies
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          dart pub get

      - name: Run build_runner build
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        run: |
          dart run build_runner build --delete-conflicting-outputs

      - name: Commit and push changes (build runner)
        uses: devops-infra/action-commit-push@master
        if: ${{ steps.release.outputs.prs_created == 'true' }}
        with:
          github_token: "${{ steps.generate-token.outputs.token }}"
          add_timestamp: false
          commit_prefix: "chore: "
          commit_message: "run build_runner build"
          force: false
          target_branch: ${{ fromJSON(steps.release.outputs.pr).headBranchName }}
