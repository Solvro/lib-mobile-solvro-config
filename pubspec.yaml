name: solvro_config
description: A comprehensive Dart linter and configuration package for all Solvro mobile projects.
version: 1.8.5

repository: https://github.com/Solvro/lib-mobile-solvro-config

environment:
  sdk: ">=3.11.0 <4.0.0"

dependencies:
  analysis_server_plugin: ^0.3.14
  analyzer: ^12.0.0
  args: ^2.7.0
  cli_completion: ^0.5.1
  mason_logger: ^0.3.5
  pub_updater: ^0.5.0
  riverpod_lint: ^3.1.4
  total_lints: ^3.11.0
  commitlint_cli: ^0.8.1
  husky: ^0.1.7
  lint_staged: ^0.5.1
  process_run: ^1.3.3+1
  yaml: ^3.1.3

lint_staged:
  "lib/**.dart": dart format && dart fix --apply

dev_dependencies:
  build_runner: ^2.15.0
  build_verify: ^3.1.1
  build_version: ^2.1.3
  mocktail: ^1.0.5
  test: ^1.27.0

executables:
  solvro_config:
